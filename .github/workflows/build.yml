name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Cache Fabric Loom
        uses: actions/cache@v4
        with:
          path: |
            .gradle/loom-cache
            ~/.gradle/caches/fabric-loom
          key: loom-${{ hashFiles('build.gradle', 'gradle.properties', 'settings.gradle') }}
          restore-keys: loom-

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XDRF-dev-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
